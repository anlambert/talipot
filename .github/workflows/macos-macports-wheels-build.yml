name: macos-macports-wheels-build
on: [push, pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  talipot-abi3:
    name: Talipot wheel build for Python ${{ matrix.python-version }}
      on ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: macos-26-intel
            arch: x86_64
          - os: macos-15
            arch: arm64

    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      python-version: "3.11"

    steps:
      - name: Checkout Talipot code
        uses: actions/checkout@v5
      - name: Install Python ${{ env.python-version }}
        uses: actions/setup-python@v5
        id: python-install
        with:
          python-version: ${{ env.python-version }}
      - name: Install build and twine Python packages
        run: |
          which python
          python --version
          sudo pip install twine build
      # sudo is required to restore macports cache, apply same workaround from
      # https://github.com/actions/cache/issues/629#issuecomment-1189184648
      - name: Install gtar wrapper
        run: |
          gtar_path=$(which gtar)
          echo "#!/bin/sh" > gtar
          echo "exec sudo $gtar_path.orig \"\$@\"" >> gtar
          sudo mv $gtar_path $gtar_path.orig
          sudo mv gtar $gtar_path
          sudo chmod +x $gtar_path
      - name: Restore macports cache
        id: restore-macports-cache
        uses: actions/cache/restore@v5
        with:
          path: /opt/local/
          key: macports-cache-${{ matrix.config.arch }}-${{ matrix.config.os }}
          restore-keys: macports-cache-${{ matrix.config.arch }}-${{ matrix.config.os }}
      - name: Install MacPorts
        run: |
          curl -LO https://raw.githubusercontent.com/GiovanniBussi/macports-ci/master/macports-ci
          source ./macports-ci install --sync=rsync
      - name: Set macOS deployment target and install MacOSX sdk 11.3
        run: |
          echo 'macosx_deployment_target 11.0' | sudo tee -a /opt/local/etc/macports/macports.conf
          echo 'macosx_sdk_version 11.3' | sudo tee -a /opt/local/etc/macports/macports.conf
          curl -LO https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz
          tar -xzf MacOSX11.3.sdk.tar.xz
          sudo mv MacOSX11.3.sdk /Library/Developer/CommandLineTools/SDKs/
      - name: Install Talipot build dependencies
        run: |
          # install libraries that need to be bundled in wheel from source
          sudo port -N -s install openssl3 expat libtool libssh2 pcre2 libiconv \
            libomp qhull yajl libgit2 graphviz zlib zstd
      - name: Compute macports cache key
        id: cache-key
        run: |
          echo "value=$(find /opt/local/var/macports/software | sha1sum | cut -c1-40)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Save macports cache
        uses: actions/cache/save@v5
        with:
          path: /opt/local/
          key: macports-cache-${{ matrix.config.arch }}-${{ matrix.config.os }}-${{ steps.cache-key.outputs.value }}
      - name: Sets CIBW_BUILD and SDKROOT environment variable
        env:
          pyVer: "${{env.python-version}}"
          arch: "${{matrix.config.arch}}"
        run: |
          echo "CIBW_BUILD=cp${pyVer/./}-macosx_$arch" >> $GITHUB_ENV
          echo "SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX11.3.sdk" >> $GITHUB_ENV
      - name: Build talipot wheel abi3 with cibuildwheel
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_REPAIR_WHEEL_COMMAND: >
            pip install abi3audit &&
            abi3audit --strict --verbose {wheel} &&
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
        run: |
          pip install cibuildwheel --user
          python -m cibuildwheel --output-dir wheelhouse

      - name: Test built wheel can be installed and imported
        working-directory: wheelhouse
        run: |
          pip install sip
          python -m sipbuild.tools.module --project talipot-sip --sdist talipot.sip
          pip install talipot_sip* && rm -f talipot_sip*

          pip install $(ls -t | head -1)
          python -c "from talipot import tlp; print(tlp.getLayoutAlgorithmPluginsList())"
          python -c "from talipot import tlp; print(tlp.getImportPluginsList())"
      - uses: actions/upload-artifact@v4
        with:
          name: talipot-wheel-abi3-${{ matrix.config.arch }}
          path: ./wheelhouse/*.whl
      - name: Publish talipot wheel to TestPyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          twine check wheelhouse/*
          twine upload --skip-existing wheelhouse/*

  talipot-sip:
    name: Talipot wheel build for Python ${{ matrix.python-version }}
      on ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    needs: [talipot-abi3]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        config:
          - os: macos-15-intel
            arch: x86_64
          - os: macos-15
            arch: arm64

    env:
      CLANG_VERSION: 20
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}

    steps:
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        id: python-install
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build and twine Python packages
        run: |
          which python
          python --version
          sudo pip install twine build
      - name: Sets CIBW_BUILD environment variable
        env:
          pyVer: "${{matrix.python-version}}"
          arch: "${{matrix.config.arch}}"
        run: |
          echo "CIBW_BUILD=cp${pyVer/./}-macosx_$arch" >> $GITHUB_ENV
      - name: Build talipot-sip wheel with cibuildwheel
        env:
          CIBW_BUILD_VERBOSITY: 1
        run: |
          pip install cibuildwheel sip --user

          python -m sipbuild.tools.module --project talipot-sip --sdist talipot.sip
          tar -xvzf talipot_sip*.tar.gz && rm -f talipot_sip*.tar.gz
          cd talipot_sip*

          python -m cibuildwheel --output-dir ../wheelhouse
      - name: Download talipot abi3 wheel
        uses: actions/download-artifact@v8
        with:
          name: talipot-wheel-abi3-${{ matrix.config.arch }}
      - name: Test built wheel can be installed and imported
        working-directory: wheelhouse
        run: |
          pip install $(ls -t | head -1)
          cd .. && pip install talipot*.whl

          python -c "from talipot import tlp; print(tlp.getLayoutAlgorithmPluginsList())"
          python -c "from talipot import tlp; print(tlp.getImportPluginsList())"

          cd wheelhouse
          python -m sipbuild.tools.module --project talipot-sip --sdist talipot.sip
      - uses: actions/upload-artifact@v4
        with:
          name: talipot-wheel-${{ matrix.python-version }}-${{ matrix.config.arch }}
          path: ./wheelhouse/*.whl
      - name: Publish talipot-sip wheel to TestPyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          twine check wheelhouse/*
          twine upload --skip-existing wheelhouse/*
