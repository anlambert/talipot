name: code-coverage
on: [push, pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ubuntu:
    name: Talipot C++ code coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Talipot code
        uses: actions/checkout@v5
      - name: Apt update
        run: sudo apt update
      - name: Install Talipot build dependencies
        run: sudo apt install
          cmake
          ninja-build
          libqhull-dev
          libyajl-dev
          libgraphviz-dev
          libpython3-dev
          libcppunit-dev
          binutils-dev
          libzstd-dev
          libgit2-dev
          qt6-base-dev
          libqt6core5compat6-dev
          libquazip1-qt6-dev
          libglew-dev
          libfreetype6-dev
          libfribidi-dev
          libfontconfig-dev
          python3
          python3-pip
          doxygen
          graphviz
          xvfb
      - name: Install sip
        run: pip3 install 'sip != 6.13.0' --user
      - name: Create build directory
        run: mkdir build
      - name: Configure Talipot build with CMake
        working-directory: ./build
        run: cmake .. -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=$PWD/install
          -DTALIPOT_BUILD_CORE_ONLY=ON
          -DTALIPOT_BUILD_TESTS=ON
          -DTALIPOT_BUILD_DOC=OFF
          -DTALIPOT_CODE_COVERAGE=ON
      - name: Talipot build
        working-directory: ./build
        run: ninja -j4 install
      - name: Run Talipot unit tests
        working-directory: ./build
        run: xvfb-run ninja tests
      - name: Generate and upload code coverage report
        uses: threeal/gcovr-action@main
        with:
          excludes: |
            build/*
            library/talipot-gui/*
            library/talipot-ogl/*
            library/talipot-python/*
            plugins/interactor/*
            plugins/view/*
            software/*
            tests/*
            thirdparty/*
            utils/*
          coveralls-send: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
